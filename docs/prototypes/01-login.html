<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — 智能客服系统</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1 class="login-title">智能客服系统</h1>
      <p class="login-subtitle">企业内部智能问答与人工客服平台</p>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="username">账号</label>
          <input type="text" id="username" placeholder="请输入账号" value="zhangsan">
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" value="••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="height:40px;margin-top:8px;">登 录</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-secondary);">
        <a href="index.html">← 返回原型总览</a>
      </p>
    </div>
  </div>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      window.location.href = '02-employee.html';
      return false;
    }
  </script>
</body>
</html>
